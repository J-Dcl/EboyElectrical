<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Eboy Electrical</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .error-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            background-color: #0b0b0b;
            color: #fff;
            padding: 20px;
        }
        .error-code { font-size: 8rem; font-weight: 700; color: #ffcc00; margin: 0; }
    </style>
</head>
<body>
    <div class="error-wrapper">
        <h1 class="error-code">404</h1>
        <h2>OOPS! PAGE NOT FOUND</h2>
        <p style="margin: 20px 0; color: #aaa;">The link you followed may be broken, or the page may have been removed.</p>
        <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Back to Homepage</a>
    </div>
</body>
</html>
