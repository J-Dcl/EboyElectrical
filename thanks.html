<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Eboy Electrical</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* specific styles for the thank you page to center the content perfectly */
        .thank-you-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            background-color: var(--bg-dark);
            padding: 20px;
        }
        .success-icon {
            font-size: 5rem;
            color: var(--accent);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <nav id="navbar" class="scrolled">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="Eboy Logo">
                <span>EBOY<span class="accent">.ELECTRICAL</span></span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Back to Home</a></li>
            </ul>
        </div>
    </nav>

    <div class="thank-you-wrapper">
        <i class="fas fa-check-circle success-icon"></i>
        <h1 class="glitch-text" style="font-size: 3rem; margin-bottom: 15px;">QUOTE REQUEST <span class="accent">SENT</span></h1>
        <p style="max-width: 600px; margin-bottom: 30px; font-size: 1.1rem;">
            Thank you for sending your quote request! Our team will get back to you within 12-24 hours to discuss your electrical motor needs.
        </p>
        <a href="index.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Return to Homepage</a>
    </div>

</body>
</html>
